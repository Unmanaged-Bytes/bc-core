name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build + test + sanitize
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build pkg-config \
            libcmocka-dev cppcheck valgrind \
            build-essential

      - name: Configure (debug)
        run: meson setup build/debug --buildtype=debug -Dtests=true

      - name: Build
        run: meson compile -C build/debug

      - name: Test
        run: meson test -C build/debug --print-errorlogs

      - name: cppcheck
        run: |
          cppcheck --project=build/debug/compile_commands.json \
            --enable=all --error-exitcode=1 --quiet --inline-suppr \
            --suppressions-list=cppcheck-suppressions.txt

      - name: Sanitizer (asan + ubsan)
        run: |
          meson setup build/asan --buildtype=debug -Dtests=true -Db_sanitize=address,undefined
          meson test -C build/asan --print-errorlogs

      - name: Sanitizer (tsan)
        run: |
          meson setup build/tsan --buildtype=debug -Dtests=true -Db_sanitize=thread
          meson test -C build/tsan --print-errorlogs
